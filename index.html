<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5W1Hメーカー</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">Random 5W1H Generator</p>
        <h1>5W1Hメーカー</h1>
        <p class="lead">
          いつ・どこで・だれが・なにを・どのように・どうしたかをランダムに組み合わせて、短い文章を作ります。
        </p>
      </header>

      <section class="controls">
        <button id="generate-all" class="primary">すべて生成</button>
        <button id="copy-output" class="secondary">結果をコピー</button>
      </section>

      <section id="result-card" class="result-card" aria-live="polite">
        <h2>生成結果</h2>
        <p id="result-text" class="result-text">読み込み中…</p>
      </section>

      <section class="grid" aria-label="5W1Hの要素">
        <article class="card">
          <div class="card-header">
            <h3>いつ</h3>
            <button class="chip" data-role="when">再生成</button>
          </div>
          <p id="when-value" class="value">-</p>
        </article>

        <article class="card">
          <div class="card-header">
            <h3>どこで</h3>
            <button class="chip" data-role="where">再生成</button>
          </div>
          <p id="where-value" class="value">-</p>
        </article>

        <article class="card">
          <div class="card-header">
            <h3>だれが</h3>
            <button class="chip" data-role="who">再生成</button>
          </div>
          <p id="who-value" class="value">-</p>
        </article>

        <article class="card">
          <div class="card-header">
            <h3>なにを</h3>
            <button class="chip" data-role="what">再生成</button>
          </div>
          <p id="what-value" class="value">-</p>
        </article>

        <article class="card">
          <div class="card-header">
            <h3>どのように</h3>
            <button class="chip" data-role="how">再生成</button>
          </div>
          <p id="how-value" class="value">-</p>
        </article>

        <article class="card">
          <div class="card-header">
            <h3>どうしたか</h3>
            <button class="chip" data-role="action">再生成</button>
          </div>
          <p id="action-value" class="value">-</p>
        </article>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
